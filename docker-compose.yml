version: '3.8'

services:
  cloud-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-monitor:latest
    container_name: cloud-monitor
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/backend/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # 数据库类型: sqlite (默认) / postgres / mysql
      - DB_TYPE=${DB_TYPE:-postgres}
      # SQLite（DB_TYPE=sqlite 时使用）
      # - DATABASE_PATH=/app/backend/data/monitor.db
      # PostgreSQL / MySQL（DB_TYPE=postgres 或 mysql 时使用）
      # 方式1: 连接字符串
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_SSL=${DB_SSL:-true}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /run

